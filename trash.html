<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style/trash.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"

      <a href="notes.html" class="back-btn">BACK</a>

    <div id="trashContainer" class="notes-container"></div>
    <div id="permanentDelete" class="popup-success">

    <script src="/script/script.js"></script>
    <script>
      renderTrash();

      if (localStorage.getItem("theme") == "dark") {
        document.body.classList.add("dark");
      }
