<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../style/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes App - Home</title>
    <link rel="icon" type="image/png" href="../icon/favicon.png">
  </head>
  <body>
    <header class="navbar">
      <div class="logo">MY NOTES APP</div>
      <div class="nav-actions">
         <a href="../index.html" class="nav-btn trash-btn"
          >BACK</a
        >
        <a href="./trash.html" class="nav-btn trash-btn"
          >🗑️ TRASH<span id="trashCount" class="badge">(0)</span></a
        >
        <button id="themeToggle" class="nav-btn dark-btn">DARK/LIGHT</button>
      </div>
    </header>

    <div class="container">
      <input
        type="text"
        class="search"
        id="search"
        placeholder="Search Notes...!"
      />

      <div class="note-input">
        <textarea
          name=""
          id="noteText"
          placeholder="Write your Notes..."
        ></textarea>
        <small id="charCount">0 / 200</small>
        <div id="successPopup" class="popup-success">Notes Added!</div>
        <div id="deletePopup" class="popup-success">Note Deleted!</div>
        <div id="editPopup" class="popup-success">Note Edited!</div>
        <div id="popupError" class="popup-error"></div>

        <select id="noteCategory">
          <option value="General">General</option>
          <option value="Work">Work</option>
          <option value="Personal">Personal</option>
          <option value="Study">Study</option>
        </select>
        <button onclick="addNotes()">ADD</button>
      </div>
      <div id="notesContainer"></div>
    </div>
    <script src="../script/script.js"></script>
  </body>
</html>
